<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registracija</title>

  <!-- Supabase JS SDK v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      background-color: #333;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
      margin-top: 10px;
    }
    button:hover {
      background-color: #555;
    }
    .error-msg {
      color: red;
      font-weight: bold;
      margin-top: 15px;
      text-align: center;
    }
    .success-msg {
      color: green;
      font-weight: bold;
      margin-top: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Registracija</h2>
  <form id="registerForm">
    <div class="form-group">
      <label for="fullName">Ime i Prezime</label>
      <input type="text" id="fullName" placeholder="Unesite ime i prezime" required>
    </div>

    <div class="form-group">
      <label for="email">E-mail Adresa</label>
      <input type="email" id="email" placeholder="example@gmail.com" required>
    </div>

    <div class="form-group">
      <label for="password">Lozinka</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label for="gender">Ja sam:</label>
      <select id="gender" required>
        <option value="Muško">Muško</option>
        <option value="Žensko">Žensko</option>
      </select>
    </div>

    <button type="submit">REGISTRUJ SE</button>
  </form>

  <div id="statusMessage"></div>
</div>

<script>
  const SUPABASE_URL = 'https://uduwpvdjmanrpgumdrfh.supabase.co';
  
  // Tvoj tačni Anon JWT ključ:
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkdXdwdmRqbWFucmdwdW1kcmZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MTEwODQsImV4cCI6MjEwMDM4NzA4NH0.zdxIxiCJcaauEP1pm75d1-4YXO1Dn6tsAhZehFh2vsQ';

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const form = document.getElementById('registerForm');
  const statusDiv = document.getElementById('statusMessage');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusDiv.textContent = 'Registracija u toku...';
    statusDiv.className = '';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const fullName = document.getElementById('fullName').value;
    const gender = document.getElementById('gender').value;

    try {
      const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: fullName,
            gender: gender
          }
        }
      });

      if (error) throw error;

      statusDiv.className = 'success-msg';
      statusDiv.textContent = 'Registracija uspješna! Provjerite e-mail za potvrdu.';
      console.log('Korisnik uspješno registrovan:', data);

    } catch (error) {
      statusDiv.className = 'error-msg';
      statusDiv.textContent = 'Greška: ' + error.message;
      console.error('Greška pri registraciji:', error);
    }
  });
</script>

</body>
</html>
